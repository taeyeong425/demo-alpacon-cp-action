name: Test Alpacon CP Action
permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-upload-download:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Alpacon CLI
        uses: alpacax/alpacon-setup-action@v1

      - name: Create test file
        run: echo "Test content for upload/download" > test-file.txt

      - name: Test file upload
        uses: ./
        with:
          workspace-url: ${{ secrets.ALPACON_WORKSPACE_URL }}
          api-token: ${{ secrets.ALPACON_API_TOKEN }}
          source: './test-hello.txt'
          target-server: 'staging-web-demo'
          target-path: '/tmp/test-upload.txt'

      - name: Test file download
        uses: ./
        with:
          workspace-url: ${{ secrets.ALPACON_WORKSPACE_URL }}
          api-token: ${{ secrets.ALPACON_API_TOKEN }}
          source: '/tmp/test-upload.txt'
          target-server: 'staging-web-demo'
          target-path: './'
          mode: download

      - name: Verify downloaded file
        run: |
          set -e
          echo "Current directory contents:"
          ls -la
          if [ -f "test-upload.txt" ]; then
            echo "✅ File downloaded successfully"
            cat test-upload.txt
          else
            echo "❌ File download failed"
            exit 1
          fi

  test-recursive-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Alpacon CLI
        uses: alpacax/alpacon-setup-action@v1

      - name: Create test directory
        run: |
          set -e
          mkdir -p test-dir/sub-dir
          echo "Test file 1" > test-dir/test-file1.txt
          echo "Test file 2" > test-dir/sub-dir/test-file2.txt

      - name: Test recursive directory upload
        uses: ./
        with:
          workspace-url: ${{ secrets.ALPACON_WORKSPACE_URL }}
          api-token: ${{ secrets.ALPACON_API_TOKEN }}
          source: './test-dir/'
          target-server: 'staging-web-demo'
          target-path: '/tmp/test-upload-dir/'
          recursive: true

  test-upload-with-username:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Alpacon CLI
        uses: alpacax/alpacon-setup-action@v1

      - name: Create test file
        run: echo "Test content with username" > test-file-username.txt

      - name: Test file upload with username
        uses: ./
        with:
          workspace-url: ${{ secrets.ALPACON_WORKSPACE_URL }}
          api-token: ${{ secrets.ALPACON_API_TOKEN }}
          source: './test-file-username.txt'
          target-server: 'staging-web-demo'
          target-path: '/tmp/test-upload-username.txt'
          username: root

      - name: Test file download with username
        uses: ./
        with:
          workspace-url: ${{ secrets.ALPACON_WORKSPACE_URL }}
          api-token: ${{ secrets.ALPACON_API_TOKEN }}
          source: '/tmp/test-upload-username.txt'
          target-server: 'staging-web-demo'
          target-path: './'
          mode: download
          username: demo

      - name: Verify downloaded file
        run: |
          set -e
          if [ -f "test-upload-username.txt" ]; then
            echo "✅ File with username downloaded successfully"
            cat test-upload-username.txt
          else
            echo "❌ File download with username failed"
            exit 1
          fi

  test-multi-source-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Alpacon CLI
        uses: alpacax/alpacon-setup-action@v1

      - name: Create test files
        run: |
          echo "Multi source test file 1" > test-multi1.txt
          echo "Multi source test file 2" > test-multi2.txt

      - name: Test multi-source upload
        uses: ./
        with:
          workspace-url: ${{ secrets.ALPACON_WORKSPACE_URL }}
          api-token: ${{ secrets.ALPACON_API_TOKEN }}
          source: |
            ./test-multi1.txt
            ./test-multi2.txt
          target-server: 'staging-web-demo'
          target-path: '/tmp/'
